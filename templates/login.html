{% extends 'base.html' %}
{% block title %}Connexion — RootCare{% endblock %}

{% block content %}
<section class="auth-section auth-section-centered">
  <div class="auth-center-container animate-fadein">
    <div class="auth-card">
      <div class="auth-card-header">
        <div class="logo-icon logo-icon-md">
          <svg width="22" height="22" viewBox="0 0 18 18" fill="none">
            <rect x="7" y="1" width="4" height="16" rx="2" fill="currentColor"/>
            <rect x="1" y="7" width="16" height="4" rx="2" fill="currentColor"/>
          </svg>
        </div>
        <h1 class="card-title">Bon retour !</h1>
        <p class="card-sub">Connectez-vous pour accéder à votre espace santé.</p>
      </div>

      <form method="POST" action="{{ url_for('login') }}" class="auth-form">

        <div class="form-group">
          <label class="form-label">Adresse email</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
              <polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" name="email" class="form-input" placeholder="votre@email.com" required autofocus>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Mot de passe</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" name="mot_de_passe" class="form-input" placeholder="Votre mot de passe" id="loginMdp" required>
            <button type="button" class="input-eye" onclick="togglePass('loginMdp', this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full btn-lg">Se connecter →</button>

        <p class="auth-switch">
          Pas encore de compte ? <a href="{{ url_for('inscription') }}" class="auth-link">S'inscrire gratuitement</a>
        </p>
      </form>
    </div>
  </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
function togglePass(id, btn) {
  const input = document.getElementById(id);
  input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
